output_dir: outputs/ir_sr_next_x4

runtime:
  device: cuda
  amp: true

data:
  root: data/ir_sr
  train_split: train
  val_split: val
  hr_subdir: HR
  lr_subdir: LR
  use_precomputed_lr: true
  exts: [".png", ".jpg", ".jpeg", ".bmp", ".tif", ".tiff"]
  scale: 4
  hr_size: 256
  num_workers: 4

model:
  in_channels: 1
  feat_channels: 64
  prior_channels: 4
  num_blocks: 10
  upscale: 4
  vae_path: path/to/ir_vae
  diffusion_model_path: path/to/ir_diffusion_model
  clip_path: model/clip-vit-large-patch14
  prior_timestep: 500
  use_prompt_adapter: true
  adapter_tokens: 8

prompt:
  train_prompt: "a high quality infrared image with clear thermal edges"
  val_prompt: "a high quality infrared image with clear thermal edges"

train:
  epochs: 200
  batch_size: 12
  lr: 0.0002
  weight_decay: 0.0001
  grad_clip: 1.0
  val_every: 1

loss:
  w_pix: 1.0
  w_grad: 0.3
  w_prior: 0.1
  w_freq: 0.05
  w_lpips: 0.05
  lpips_net: alex
