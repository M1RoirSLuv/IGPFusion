seed: 42
output_dir: outputs/ir_sr
data:
  root: data/dataset
  train_split: train
  val_split: val
  hr_subdir: HR
  lr_subdir: LR
  use_precomputed_lr: false
  exts:
  - png
  - jpg
  - jpeg
  - bmp
  scale: 4
  hr_size: 256
  num_workers: 4
model:
  in_ch: 1
  feat_ch: 64
  num_blocks: 8
  upscale: 4
train:
  epochs: 160
  batch_size: 8
  lr: 0.0001
  weight_decay: 0.0
  grad_clip: 1.0
  val_every: 1
  save_every: 5
  stage_name: stage2_flir_refine
  resume_ckpt: outputs/ir_sr/best_stage1_synth.pth
  resume_mode: finetune
  reset_best_on_resume: true
  use_teacher_distill: false
  teacher_path: generative
  teacher_layer_keys:
  - down0
  - mid
  - up0
  use_prompt_loss: false
loss:
  w_l1: 1.0
  w_lpips: 0.1
  w_distill: 0.05
  w_freq: 0.05
  w_prompt: 0.02
runtime:
  device: cuda
  amp: true
prompt:
  model_name_or_path: model/clip-vit-large-patch14
  positive_prompt: a high quality infrared image with clear thermal edges
  negative_prompt: a blurry noisy low quality infrared image
  margin: 0.1
